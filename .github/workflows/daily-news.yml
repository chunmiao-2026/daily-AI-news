name: 每日 AI 资讯推送 · 云端备份

on:
  # 北京时间每天 9:03 → UTC 1:03
  schedule:
    - cron: "3 1 * * *"

  # 手动触发
  workflow_dispatch:

jobs:
  push-news:
    name: 高质量 RSS 抓取推送（本地不可用时的备份）
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行推送（v2 · 高质量源 · 基础格式）
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python push_news_v2.py
