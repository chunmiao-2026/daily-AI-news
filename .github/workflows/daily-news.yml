name: 每日 AI 资讯推送

on:
  # 定时触发：北京时间每天 9:03 → UTC 1:03
  # China 不使用夏令时，永远 UTC+8
  schedule:
    - cron: "3 1 * * *"

  # 也支持手动触发（在 GitHub 网页上点按钮）
  workflow_dispatch:

jobs:
  push-news:
    name: 抓取资讯并推送微信
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 缓存依赖，加速下次运行

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行推送脚本
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python push_news.py
