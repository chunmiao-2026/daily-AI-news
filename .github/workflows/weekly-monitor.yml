name: 行业监测日报

on:
  # ⛔ 已禁用自动推送（仅保留手动触发）
  workflow_dispatch:

jobs:
  daily-report:
    name: 生成行业日报并推送微信
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: 运行日报脚本
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python weekly_report.py
